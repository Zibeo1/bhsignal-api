server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: integration-api
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:h2:file:./data/integration-db;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH}
    username: ${SPRING_DATASOURCE_USERNAME:sa}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    database-platform: ${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.H2Dialect}
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: true
  jackson:
    serialization:
      write-dates-as-timestamps: false

management:
  endpoints:
    web:
      exposure:
        include: health,info

  endpoint:
    health:
      show-details: always

app:
  webhook:
    secret: ${APP_WEBHOOK_SECRET:local-secret}
  cors:
    allowed-origins:
      - ${APP_CORS_ALLOWED_ORIGIN:http://localhost:4200}
  auth:
    token-secret: ${APP_AUTH_TOKEN_SECRET:local-auth-secret}
    token-ttl-seconds: ${APP_AUTH_TOKEN_TTL_SECONDS:604800}
  news:
    bosnia-only: ${APP_NEWS_BOSNIA_ONLY:true}
